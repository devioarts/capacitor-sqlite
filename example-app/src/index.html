<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>capacitor-sqlite — example</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; padding: 1.5rem; }
      h1 { font-size: 1.4rem; color: #38bdf8; margin-bottom: 1.5rem; }
      h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: .08em; color: #94a3b8; margin-bottom: .75rem; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: .5rem; margin-bottom: 1.5rem; }
      button {
        background: #1e40af; color: #fff; border: none; border-radius: 6px;
        padding: .55rem .9rem; font-size: .85rem; cursor: pointer; transition: background .15s;
      }
      button:hover { background: #2563eb; }
      button:disabled { background: #334155; color: #64748b; cursor: default; }
      button.danger { background: #7f1d1d; }
      button.danger:hover { background: #991b1b; }
      p.hint { font-size: .8rem; color: #475569; margin-top: .5rem; }
    </style>
  </head>
  <body>
    <h1>capacitor-sqlite — demo <span id="platformBadge" style="font-size:.7rem;padding:.2rem .6rem;border-radius:4px;background:#1e293b;color:#94a3b8;vertical-align:middle"></span></h1>

    <h2>Setup</h2>
    <div class="grid">
      <button id="btnGetPlatform">getPlatform() — Capacitor</button>
      <button id="btnPluginPlatform">getPlatform() — plugin</button>
      <button id="btnAvailable">isAvailable()</button>
      <button id="btnOpen">open() + migrations</button>
      <button id="btnGetVersion">getVersion()</button>
      <button id="btnClose">close()</button>
    </div>

    <h2>CRUD</h2>
    <div class="grid">
      <button id="btnInsert">insert 3 users</button>
      <button id="btnQuery">query all users</button>
      <button id="btnRun">run UPDATE</button>
      <button id="btnBatch">runBatch (5 rows)</button>
      <button id="btnExec">execute DDL</button>
    </div>

    <h2>Transactions</h2>
    <div class="grid">
      <button id="btnTxOk">transaction (commit)</button>
      <button id="btnTxFail">transaction (rollback)</button>
    </div>

    <h2>In-memory DB</h2>
    <div class="grid">
      <button id="btnMemory">:memory: demo</button>
    </div>

    <h2>Danger zone</h2>
    <div class="grid">
      <button id="btnReset" class="danger">reset database</button>
    </div>

    <p class="hint">Results are logged to the browser console (F12).</p>

    <script src="./example.ts" type="module"></script>
  </body>
</html>
